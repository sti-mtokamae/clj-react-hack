name: Feature Request
description: 新機能の提案
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        新機能の提案をありがとうございます。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい問題
      description: この機能リクエストはどのような問題に関連していますか？
      placeholder: 現在の問題や制限について説明してください...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような解決策を提案しますか？
      placeholder: 提案する機能や改善について詳しく説明してください...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討した代替案はありますか？
      placeholder: 検討した他の解決方法があれば記載してください...

  - type: textarea
    id: additional
    attributes:
      label: 追加情報
      description: その他、関連する情報があれば記載してください。
      placeholder: 参考資料、モックアップ、類似機能の例など...
