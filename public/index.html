<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>th-tools-ui-hack</title>
  <!-- <link href="/output.css" rel="stylesheet"> -->
  <script src="/js/main.js" defer></script>
</head>
<body style="background: white; color: black; padding: 20px;">
  <!-- ヘッダー -->
  <div style="margin-bottom: 30px;">
    <h1>🏝️ Helix ✕ UIx Multi-Island Demo</h1>
    <p style="color: #666; font-size: 14px;">各 island は独立した React root で動作します</p>
  </div>

  <!-- Island A: Helix Counter -->
  <div id="app"></div>

  <!-- Island B: Helix Card -->
  <div id="island-b"></div>

  <!-- Island C: UIx Card -->
  <div id="island-c-uix"></div>

  <div style="color: blue; font-size: 18px; margin-top: 20px;">
    HTMLテスト: この青いテキストが見えれば、基本的なHTMLは動作しています。
  </div>
  <script>
    console.log("HTMLページが読み込まれました");
    setTimeout(() => {
      const appDiv = document.getElementById('app');
      if (appDiv && appDiv.innerHTML.trim() === '') {
        appDiv.innerHTML = '<div style="color: red; font-size: 16px;">ClojureScriptがまだ読み込まれていません...</div>';
      }
    }, 2000);
  </script>
</body>
</html>
