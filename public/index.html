<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>th-tools-ui-hack</title>
  <link href="/output.css" rel="stylesheet">
  <script src="/js/main.js" defer></script>
</head>
<body style="background: white; color: black; padding: 20px;">
  <div id="app"></div>
  <div style="color: blue; font-size: 18px; margin-top: 20px;">
    HTMLテスト: この青いテキストが見えれば、基本的なHTMLは動作しています。
  </div>
  <script>
    console.log("HTMLページが読み込まれました");
    setTimeout(() => {
      const appDiv = document.getElementById('app');
      if (appDiv && appDiv.innerHTML.trim() === '') {
        appDiv.innerHTML = '<div style="color: red; font-size: 16px;">ClojureScriptがまだ読み込まれていません...</div>';
      }
    }, 2000);
  </script>
</body>
</html>
